<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Genesis Terminal</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.css" crossorigin="anonymous" />
	<style>__COMPONENT_CSS__</style>
</head>
<body>
	<div id="terminal_wrap" class="terminal-wrap">
		<div class="terminal-header">
			<div class="left">
				<span class="dot"></span>
				<span class="title">Genesis Terminal</span>
				<span id="workspace_badge" class="badge">workspace</span>
				<span id="shell_badge" class="badge">shell</span>
			</div>
			<div class="controls">
				<button id="clear_btn" type="button">Clear</button>
				<button id="copy_btn" type="button">Copy</button>
				<button id="close_btn" type="button">Close</button>
			</div>
		</div>
		<div id="terminal" class="terminal-container"></div>
	</div>
	<script type="text/javascript">__COMPONENT_JS__</script>
</body>
</html>
